services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: soamco-budget-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - soamco-budget

  web:
    image: nginx:1.27-alpine
    container_name: soamco-budget-web
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - soamco-budget

  node:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    container_name: soamco-budget-node
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - soamco_budget_node_modules:/var/www/html/node_modules
    depends_on:
      app:
        condition: service_healthy
    command: sh -c "npm ci && npm run build -- --watch"
    networks:
      - soamco-budget

  db:
    image: postgres:17-alpine
    container_name: soamco-budget-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: soamco_budget
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - soamco_budget_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U root -d soamco_budget"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    networks:
      - soamco-budget

  redis:
    image: redis:7-alpine
    container_name: soamco-budget-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    networks:
      - soamco-budget

  horizon:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: soamco-budget-horizon
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      app:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: php artisan horizon
    networks:
      - soamco-budget

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: soamco-budget-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      app:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: php artisan schedule:work
    networks:
      - soamco-budget

  proxy:
    image: caddy:2-alpine
    container_name: soamco-budget-proxy
    restart: unless-stopped
    depends_on:
      web:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - soamco_budget_caddy_data:/data
      - soamco_budget_caddy_config:/config
    networks:
      - soamco-budget

volumes:
  soamco_budget_postgres_data:
  soamco_budget_caddy_data:
  soamco_budget_caddy_config:
  soamco_budget_node_modules:

networks:
  soamco-budget:
    driver: bridge
