services:
  app:
    image: ${SOAMCO_PHP_IMAGE:-soamco-budget-php}
    container_name: soamco-budget-app
    restart: unless-stopped
    working_dir: /var/www/html
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'php-fpm', '-t']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - soamco-budget

  web:
    image: ${SOAMCO_WEB_IMAGE:-nginx:1.27-alpine}
    container_name: soamco-budget-web
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
        restart: true
    networks:
      - soamco-budget

  db:
    image: postgres:17-alpine
    container_name: soamco-budget-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-soamco_budget}
      POSTGRES_USER: ${POSTGRES_USER:-root}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root}
    volumes:
      - soamco_budget_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -h 127.0.0.1 -U ${POSTGRES_USER:-root} -d ${POSTGRES_DB:-soamco_budget}',
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    networks:
      - soamco-budget

  redis:
    image: redis:7-alpine
    container_name: soamco-budget-redis
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    networks:
      - soamco-budget

  horizon:
    image: ${SOAMCO_PHP_IMAGE:-soamco-budget-php}
    container_name: soamco-budget-horizon
    restart: unless-stopped
    working_dir: /var/www/html
    depends_on:
      app:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: php artisan horizon
    networks:
      - soamco-budget

  scheduler:
    image: ${SOAMCO_PHP_IMAGE:-soamco-budget-php}
    container_name: soamco-budget-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    depends_on:
      app:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: php artisan schedule:work
    networks:
      - soamco-budget

  reverb:
    image: ${SOAMCO_PHP_IMAGE:-soamco-budget-php}
    container_name: soamco-budget-reverb
    restart: unless-stopped
    working_dir: /var/www/html
    depends_on:
      app:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - '8080'
    command: php artisan reverb:start
    healthcheck:
      test:
        [
          'CMD',
          'php',
          '-r',
          "$$connection = @fsockopen('127.0.0.1', 8080); exit($$connection ? 0 : 1);",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - soamco-budget

  proxy:
    image: caddy:2-alpine
    container_name: soamco-budget-proxy
    restart: unless-stopped
    depends_on:
      web:
        condition: service_started
        restart: true
    volumes:
      - soamco_budget_caddy_data:/data
      - soamco_budget_caddy_config:/config
    networks:
      - soamco-budget

  umami-db:
    image: postgres:17-alpine
    container_name: ${UMAMI_DB_CONTAINER_NAME:-soamco-budget-umami-db}
    restart: unless-stopped
    profiles: ['umami']
    environment:
      POSTGRES_DB: ${UMAMI_DB_NAME:-umami}
      POSTGRES_USER: ${UMAMI_DB_USER:-umami}
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD:-umami}
    volumes:
      - soamco_budget_umami_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -h 127.0.0.1 -U ${UMAMI_DB_USER:-umami} -d ${UMAMI_DB_NAME:-umami}',
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    networks:
      - soamco-budget

  umami:
    image: docker.umami.is/umami-software/umami:postgresql-latest
    container_name: ${UMAMI_CONTAINER_NAME:-soamco-budget-umami}
    restart: unless-stopped
    profiles: ['umami']
    depends_on:
      umami-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${UMAMI_DB_USER:-umami}:${UMAMI_DB_PASSWORD:-umami}@${UMAMI_DB_HOST:-umami-db}:5432/${UMAMI_DB_NAME:-umami}?schema=public&sslmode=${UMAMI_DB_SSL_MODE:-disable}
      APP_SECRET: ${UMAMI_APP_SECRET:-change-me-before-production}
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget --no-verbose --tries=1 --spider http://127.0.0.1:3000 || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - soamco-budget

volumes:
  soamco_budget_postgres_data:
  soamco_budget_umami_postgres_data:
  soamco_budget_caddy_data:
  soamco_budget_caddy_config:

networks:
  soamco-budget:
    driver: bridge
